spring:
  profiles:
    active: dev
  application:
    name: jankalyan

logging:
  level:
    root: INFO
    com.jankalyan: DEBUG
  file:
    name: logs/jankalyan.log

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
