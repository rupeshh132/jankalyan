version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: jankalyan-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jankalyan_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      # If root password isn't provided via env, we generate a random one to secure the db
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jankalyan_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jankalyan-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - jankalyan_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Note: Port 8080 is NOT exposed to the host, it is only accessible internally on jankalyan_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jankalyan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jankalyan_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
    name: jankalyan_mysql_data

networks:
  jankalyan_net:
    name: jankalyan_net
    driver: bridge
